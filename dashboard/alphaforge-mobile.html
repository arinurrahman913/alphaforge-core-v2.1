<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaForge v2 — Mobile Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
        body.dark-mode { background: #1a1a1a; color: #e0e0e0; }

        .app-container { display: flex; flex-direction: column; height: 100vh; }

        .header { background: white; padding: 12px 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        body.dark-mode .header { background: #222; border-bottom-color: #555; }

        .header h1 { font-size: 18px; }
        .header p { font-size: 11px; color: #666; }
        body.dark-mode .header p { color: #999; }

        .theme-toggle { padding: 6px 10px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 12px; }
        body.dark-mode .theme-toggle { background: #333; border-color: #555; color: #e0e0e0; }

        .nav-tabs { display: flex; overflow-x: auto; background: white; border-bottom: 2px solid #ddd; padding: 0; }
        body.dark-mode .nav-tabs { background: #222; border-bottom-color: #555; }

        .nav-tab { flex: 0 0 auto; padding: 12px 14px; font-size: 12px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .nav-tab:hover { background: #f5f5f5; }
        body.dark-mode .nav-tab:hover { background: #333; }

        .nav-tab.active { border-bottom-color: #0066cc; color: #0066cc; font-weight: 600; }

        .search-box { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; margin: 12px 12px 0; font-size: 14px; }
        body.dark-mode .search-box { background: #333; border-color: #555; color: #e0e0e0; }

        .content-body { flex: 1; overflow-y: auto; padding: 12px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .stat-card { background: white; padding: 12px; border-radius: 6px; }
        body.dark-mode .stat-card { background: #333; }

        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        body.dark-mode .stat-label { color: #999; }

        .stat-value { font-size: 18px; font-weight: 600; }

        .table-wrapper { background: white; border-radius: 6px; overflow: hidden; }
        body.dark-mode .table-wrapper { background: #333; }

        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #f9f9f9; padding: 10px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; }
        body.dark-mode th { background: #222; border-bottom-color: #555; }

        td { padding: 10px; border-bottom: 1px solid #eee; }
        body.dark-mode td { border-bottom-color: #444; }

        tr:hover { background: #f9f9f9; }
        body.dark-mode tr:hover { background: #2a2a2a; }

        .ticker-cell { font-weight: 600; color: #0066cc; }

        .badge { display: inline-block; padding: 3px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }
        .badge-high { background: #dcfce7; color: #166534; }
        .badge-medium { background: #fef3c7; color: #92400e; }
        .badge-low { background: #fee2e2; color: #991b1b; }

        .progress-bar { display: inline-block; height: 16px; background: linear-gradient(to right, #ef4444, #f97316, #eab308, #84cc16, #10b981); border-radius: 2px; width: 80px; font-size: 10px; color: white; text-align: center; line-height: 16px; font-weight: 600; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 20% auto; padding: 0; border-radius: 8px; width: 95%; max-height: 70vh; overflow-y: auto; }
        body.dark-mode .modal-content { background: #222; }

        .modal-header { padding: 14px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; background: #f9f9f9; }
        body.dark-mode .modal-header { background: #333; border-bottom-color: #555; }

        .modal-header h2 { font-size: 16px; }
        .close { font-size: 24px; cursor: pointer; }
        .modal-body { padding: 14px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div>
                <h1>AlphaForge v2</h1>
                <p>Mobile Dashboard</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="nav-tabs" id="navTabs"></div>

        <input type="text" class="search-box" id="searchBox" placeholder="Cari ticker..." onkeyup="filterTable()">

        <div class="content-body">
            <div id="statsContainer"></div>
            <div id="tableContainer"></div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let currentStage = 'layer1';
        let allData = {};

        const stages = [
            { id: 'layer1', file: 'data/layer1_context.json', title: '🌍 Market' },
            { id: 'evidence', file: 'data/evidence.json', title: '🔍 Evidence' },
            { id: 'knowledge', file: 'data/knowledge.json', title: '📚 Knowledge' },
            { id: 'peer', file: 'data/peer_results.json', title: '🤝 Peer' },
            { id: 'confidence', file: 'data/confidence_scores.json', title: '✅ Confidence' },
            { id: 'risk', file: 'data/risk_assessments.json', title: '⚠️ Risk' },
            { id: 'reasoning', file: 'data/reasoning_outputs.json', title: '🧠 Reasoning' },
            { id: 'aggregator', file: 'data/final_recommendations.json', title: '🎯 Aggregator' }
        ];

        function initTabs() {
            const navTabs = document.getElementById('navTabs');
            stages.forEach(stage => {
                const tab = document.createElement('div');
                tab.className = 'nav-tab' + (stage.id === 'layer1' ? ' active' : '');
                tab.textContent = stage.title;
                tab.onclick = () => switchStage(stage.id);
                navTabs.appendChild(tab);
            });
        }

        function switchStage(stageId) {
            currentStage = stageId;
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            loadAndRender(stageId);
        }

        async function loadAndRender(stage) {
            try {
                const stageConfig = stages.find(s => s.id === stage);
                if (!allData[stage]) {
                    const response = await fetch(stageConfig.file);
                    allData[stage] = await response.json();
                }
                renderStage(stage, allData[stage]);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableContainer').innerHTML = `<p style="color:#f97316;">Error loading</p>`;
            }
        }

        function renderStage(stage, data) {
            let statsHtml = '';
            let tableHtml = '';

            if (stage === 'layer1') {
                statsHtml = `<div class="stats"><div class="stat-card"><div class="stat-label">Components</div><div class="stat-value">${Object.keys(data).length}</div></div></div>`;
                tableHtml = `<div class="table-wrapper"><table><thead><tr><th>Component</th><th>Status</th></tr></thead><tbody>${Object.entries(data).map(([key, val]) => `<tr><td class="ticker-cell">${key}</td><td><span class="badge ${val.status === 'ok' ? 'badge-high' : 'badge-medium'}">${val.status}</span></td></tr>`).join('')}</tbody></table></div>`;
            } else if (stage === 'evidence') {
                const packages = data.packages || [];
                statsHtml = `<div class="stats"><div class="stat-card"><div class="stat-label">Packages</div><div class="stat-value">${packages.length}</div></div></div>`;
                tableHtml = `<div class="table-wrapper"><table><thead><tr><th>Ticker</th><th>Price</th><th>Mkt Cap</th></tr></thead><tbody>${packages.map(pkg => `<tr><td class="ticker-cell">${pkg.ticker}</td><td>$${pkg.price_market?.close || '—'}</td><td>$${(pkg.price_market?.market_cap / 1e9).toFixed(1)}B</td></tr>`).join('')}</tbody></table></div>`;
            } else if (stage === 'confidence') {
                const scores = data.scores || [];
                statsHtml = `<div class="stats"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${scores.length}</div></div><div class="stat-card"><div class="stat-label">Avg</div><div class="stat-value">${(scores.reduce((s, s2) => s + s2.overall_confidence, 0) / scores.length).toFixed(0)}%</div></div></div>`;
                tableHtml = `<div class="table-wrapper"><table><thead><tr><th>Ticker</th><th>Confidence</th><th>Rating</th></tr></thead><tbody>${scores.map(s => `<tr><td class="ticker-cell">${s.ticker}</td><td><div class="progress-bar">${s.overall_confidence.toFixed(0)}</div></td><td><span class="badge ${s.confidence_rating === 'high' ? 'badge-high' : 'badge-medium'}">${s.confidence_rating}</span></td></tr>`).join('')}</tbody></table></div>`;
            } else if (stage === 'risk') {
                const assessments = data.assessments || [];
                statsHtml = `<div class="stats"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${assessments.length}</div></div><div class="stat-card"><div class="stat-label">High Risk</div><div class="stat-value">${assessments.filter(a => a.risk_rating === 'high').length}</div></div></div>`;
                tableHtml = `<div class="table-wrapper"><table><thead><tr><th>Ticker</th><th>Risk</th><th>Flags</th></tr></thead><tbody>${assessments.map(a => `<tr><td class="ticker-cell">${a.ticker}</td><td><div class="progress-bar">${a.risk_score.toFixed(0)}</div></td><td>${a.red_flags.length}</td></tr>`).join('')}</tbody></table></div>`;
            } else if (stage === 'aggregator') {
                const recs = data.recommendations || [];
                statsHtml = `<div class="stats"><div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${recs.length}</div></div><div class="stat-card"><div class="stat-label">Buy+</div><div class="stat-value">${recs.filter(r => r.recommendation.includes('buy')).length}</div></div></div>`;
                tableHtml = `<div class="table-wrapper"><table><thead><tr><th>Ticker</th><th>Rec</th><th>Conviction</th></tr></thead><tbody>${recs.map(r => `<tr><td class="ticker-cell">${r.ticker}</td><td><span class="badge">${r.recommendation.substring(0, 1).toUpperCase()}</span></td><td>${r.conviction}%</td></tr>`).join('')}</tbody></table></div>`;
            } else {
                tableHtml = `<div class="table-wrapper"><p style="padding: 12px;">Data loading...</p></div>`;
            }

            document.getElementById('statsContainer').innerHTML = statsHtml;
            document.getElementById('tableContainer').innerHTML = tableHtml;
        }

        function filterTable() {
            const search = document.getElementById('searchBox').value.toUpperCase();
            const rows = document.querySelectorAll('table tbody tr');
            rows.forEach(row => {
                const ticker = row.cells[0]?.textContent.toUpperCase();
                row.style.display = ticker?.includes(search) ? '' : 'none';
            });
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('mobileDarkMode', document.body.classList.contains('dark-mode'));
        }

        if (localStorage.getItem('mobileDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) modal.style.display = 'none';
        };

        initTabs();
        loadAndRender('layer1');
    </script>
</body>
</html>

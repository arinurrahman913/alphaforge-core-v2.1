<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaForge v2 — Smart Unified Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
        body.dark-mode { background: #1a1a1a; color: #e0e0e0; }

        .container { display: flex; height: 100vh; }

        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; overflow-y: auto; }
        body.dark-mode .sidebar { background: #222; border-right-color: #555; }

        .sidebar-header { padding: 24px 16px; border-bottom: 1px solid #ddd; }
        body.dark-mode .sidebar-header { border-bottom-color: #555; }

        .sidebar-header h1 { font-size: 16px; margin-bottom: 4px; }
        .sidebar-header p { font-size: 12px; color: #666; }
        body.dark-mode .sidebar-header p { color: #999; }

        .nav-section { padding: 16px 0; border-bottom: 1px solid #eee; }
        body.dark-mode .nav-section { border-bottom-color: #444; }

        .nav-section-title { padding: 0 16px; font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        body.dark-mode .nav-section-title { color: #999; }

        .nav-item { padding: 12px 16px; cursor: pointer; border-left: 3px solid transparent; font-size: 13px; transition: all 0.2s; }
        .nav-item:hover { background: #f5f5f5; }
        body.dark-mode .nav-item:hover { background: #333; }

        .nav-item.active { background: #e0e7ff; color: #0066cc; border-left-color: #0066cc; font-weight: 500; }
        body.dark-mode .nav-item.active { background: #312e81; color: #a5b4fc; }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .header { background: white; padding: 20px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
        body.dark-mode .header { background: #222; border-bottom-color: #555; }

        .header h2 { font-size: 20px; }
        .header p { font-size: 12px; color: #666; margin-top: 2px; }
        body.dark-mode .header p { color: #999; }

        .theme-toggle { padding: 8px 12px; background: #f0f0f0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 14px; }
        body.dark-mode .theme-toggle { background: #333; border-color: #555; color: #e0e0e0; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .stage { display: none; }
        .stage.active { display: block; }

        /* Layer1 - Cards */
        .layer1-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
        .metric-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; }
        body.dark-mode .metric-card { background: #333; border-color: #555; }

        .metric-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; letter-spacing: 0.5px; }
        body.dark-mode .metric-label { color: #999; }

        .metric-value { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .metric-narrative { font-size: 13px; line-height: 1.5; color: #555; }
        body.dark-mode .metric-narrative { color: #bbb; }

        /* Tables */
        .search-box { width: 300px; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
        body.dark-mode .search-box { background: #333; border-color: #555; color: #e0e0e0; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .stat-card { background: white; padding: 14px; border-radius: 6px; border: 1px solid #eee; }
        body.dark-mode .stat-card { background: #333; border-color: #555; }

        .stat-label { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
        body.dark-mode .stat-label { color: #999; }

        .stat-value { font-size: 20px; font-weight: 600; }

        .table-wrapper { background: white; border-radius: 8px; border: 1px solid #eee; overflow: hidden; }
        body.dark-mode .table-wrapper { background: #333; border-color: #555; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; font-size: 12px; border-bottom: 2px solid #ddd; }
        body.dark-mode th { background: #222; border-bottom-color: #555; }

        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        body.dark-mode td { border-bottom-color: #444; }

        tr:hover { background: #f9f9f9; }
        body.dark-mode tr:hover { background: #2a2a2a; }

        .ticker { font-weight: 600; color: #0066cc; }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 3px; font-size: 11px; font-weight: 500; }
        .badge-ok { background: #dcfce7; color: #166534; }
        .badge-medium { background: #fef3c7; color: #92400e; }
        .badge-alert { background: #fee2e2; color: #991b1b; }

        .loading { padding: 40px 20px; text-align: center; color: #666; }
        body.dark-mode .loading { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>AlphaForge v2</h1>
                <p>Smart Unified Dashboard</p>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Market</div>
                <div class="nav-item active" onclick="switchStage('layer1')">🌍 Layer 1</div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Fase A</div>
                <div class="nav-item" onclick="switchStage('screening')">🔎 Screening</div>
                <div class="nav-item" onclick="switchStage('evidence')">🔍 Evidence</div>
                <div class="nav-item" onclick="switchStage('knowledge')">📚 Knowledge</div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Fase B</div>
                <div class="nav-item" onclick="switchStage('peer')">🤝 Peer</div>
                <div class="nav-item" onclick="switchStage('confidence')">✅ Confidence</div>
                <div class="nav-item" onclick="switchStage('risk')">⚠️ Risk</div>
                <div class="nav-item" onclick="switchStage('reasoning')">🧠 Reasoning</div>
                <div class="nav-item" onclick="switchStage('aggregator')">🎯 Aggregator</div>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">
            <div class="header">
                <div>
                    <h2 id="headerTitle">Layer 1 — Market Context</h2>
                    <p id="headerDesc">12 macro components</p>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
            </div>

            <div class="content">
                <!-- LAYER1 -->
                <div id="stage-layer1" class="stage active">
                    <div class="layer1-grid" id="layer1-content"></div>
                </div>

                <!-- SCREENING -->
                <div id="stage-screening" class="stage">
                    <div class="stats" id="screening-stats"></div>
                    <div class="table-wrapper"><table id="screening-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- EVIDENCE -->
                <div id="stage-evidence" class="stage">
                    <input type="text" class="search-box" id="evidence-search" placeholder="Cari ticker..." onkeyup="filterTable('evidence')">
                    <div class="stats" id="evidence-stats"></div>
                    <div class="table-wrapper"><table id="evidence-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- KNOWLEDGE -->
                <div id="stage-knowledge" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('knowledge')">
                    <div class="stats" id="knowledge-stats"></div>
                    <div class="table-wrapper"><table id="knowledge-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- PEER -->
                <div id="stage-peer" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('peer')">
                    <div class="stats" id="peer-stats"></div>
                    <div class="table-wrapper"><table id="peer-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- CONFIDENCE -->
                <div id="stage-confidence" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('confidence')">
                    <div class="stats" id="confidence-stats"></div>
                    <div class="table-wrapper"><table id="confidence-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- RISK -->
                <div id="stage-risk" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('risk')">
                    <div class="stats" id="risk-stats"></div>
                    <div class="table-wrapper"><table id="risk-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- REASONING -->
                <div id="stage-reasoning" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('reasoning')">
                    <div class="stats" id="reasoning-stats"></div>
                    <div class="table-wrapper"><table id="reasoning-table"><thead></thead><tbody></tbody></table></div>
                </div>

                <!-- AGGREGATOR -->
                <div id="stage-aggregator" class="stage">
                    <input type="text" class="search-box" placeholder="Cari ticker..." onkeyup="filterTable('aggregator')">
                    <div class="stats" id="aggregator-stats"></div>
                    <div class="table-wrapper"><table id="aggregator-table"><thead></thead><tbody></tbody></table></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = {};

        const stages = {
            layer1: { file: 'data/layer1_context.json', title: '🌍 Layer 1 — Market Context', desc: '12 macro components' },
            screening: { file: 'data/screening.json', title: '🔎 Screening', desc: 'Candidate filtering from universe' },
            evidence: { file: 'data/evidence.json', title: '🔍 Evidence', desc: 'Price, fundamentals, news' },
            knowledge: { file: 'data/knowledge.json', title: '📚 Knowledge', desc: '7-section profiles' },
            peer: { file: 'data/peer_results.json', title: '🤝 Peer Comparison', desc: 'Percentile positioning' },
            confidence: { file: 'data/confidence_scores.json', title: '✅ Confidence Scoring', desc: 'Data quality (0-100)' },
            risk: { file: 'data/risk_assessments.json', title: '⚠️ Risk Assessment', desc: 'Red flags & anomalies' },
            reasoning: { file: 'data/reasoning_outputs.json', title: '🧠 Reasoning Pipeline', desc: '3-lens analysis' },
            aggregator: { file: 'data/final_recommendations.json', title: '🎯 Final Recommendations', desc: 'Aggregated recommendation' }
        };

        function switchStage(stage) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));

            document.getElementById('headerTitle').textContent = stages[stage].title;
            document.getElementById('headerDesc').textContent = stages[stage].desc;
            document.getElementById(`stage-${stage}`).classList.add('active');

            loadData(stage);
        }

        async function loadData(stage) {
            if (allData[stage]) {
                renderStage(stage, allData[stage]);
                return;
            }

            try {
                const response = await fetch(stages[stage].file);
                const data = await response.json();
                allData[stage] = data;
                renderStage(stage, data);
            } catch (error) {
                console.error(`Error loading ${stage}:`, error);
                document.getElementById(`stage-${stage}`).innerHTML = `<p class="loading">Error loading data</p>`;
            }
        }

        function renderStage(stage, data) {
            if (stage === 'layer1') renderLayer1(data);
            else if (stage === 'screening') renderScreening(data);
            else if (stage === 'evidence') renderEvidence(data);
            else if (stage === 'knowledge') renderKnowledge(data);
            else if (stage === 'peer') renderPeer(data);
            else if (stage === 'confidence') renderConfidence(data);
            else if (stage === 'risk') renderRisk(data);
            else if (stage === 'reasoning') renderReasoning(data);
            else if (stage === 'aggregator') renderAggregator(data);
        }

        function renderLayer1(data) {
            const components = data.components || {};
            const html = Object.entries(components).map(([key, comp]) => `
                <div class="metric-card">
                    <div class="metric-label">${comp.name || key}</div>
                    <div class="metric-value">${comp.status === 'ok' ? '✓' : '⚠'}</div>
                    <div style="font-size:11px;color:#0066cc;margin-bottom:8px">${comp.kind || ''}</div>
                    <div class="metric-narrative">${comp.narrative || '—'}</div>
                </div>
            `).join('');
            document.getElementById('layer1-content').innerHTML = html;
        }

        function renderScreening(data) {
            const passed = data.passed || [];
            const excluded = data.hard_excluded || [];

            document.getElementById('screening-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Universe Raw</div><div class="stat-value">${data.universe_raw || 0}</div></div>
                <div class="stat-card"><div class="stat-label">After Filter</div><div class="stat-value">${data.universe_after_cheap_filter || 0}</div></div>
                <div class="stat-card"><div class="stat-label">Passed</div><div class="stat-value">${passed.length}</div></div>
                <div class="stat-card"><div class="stat-label">Excluded</div><div class="stat-value">${excluded.length}</div></div>
            `;

            const thead = document.querySelector('#screening-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Exchange</th><th>Market Cap</th><th>Avg Volume 20d</th><th>Price</th><th>Status</th><th>Flags</th></tr>';

            const tbody = document.querySelector('#screening-table tbody');
            const allTickers = [...passed.map(p => ({ ...p, status: 'passed' })), ...excluded.map(e => ({ ...e, status: 'excluded' }))];
            tbody.innerHTML = allTickers.map(t => `
                <tr>
                    <td class="ticker">${t.ticker}</td>
                    <td>${t.exchange}</td>
                    <td>$${t.market_cap ? (t.market_cap / 1e9).toFixed(2) : '—'}B</td>
                    <td>$${t.avg_dollar_volume_20d ? (t.avg_dollar_volume_20d / 1e6).toFixed(2) : '—'}M</td>
                    <td>$${t.last_price?.toFixed(2) || '—'}</td>
                    <td><span class="badge ${t.status === 'passed' ? 'badge-ok' : 'badge-alert'}">${t.status === 'passed' ? 'PASSED' : 'EXCLUDED'}</span></td>
                    <td>${t.soft_flags?.join(', ') || (t.hard_exclude_reason || '—')}</td>
                </tr>
            `).join('');
        }

        function renderEvidence(data) {
            const packages = data.packages || [];
            document.getElementById('evidence-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${packages.length}</div></div>
                <div class="stat-card"><div class="stat-label">Avg Market Cap</div><div class="stat-value">$${(packages.reduce((s, p) => s + (p.price_market?.market_cap || 0), 0) / packages.length / 1e9).toFixed(1)}B</div></div>
            `;

            const thead = document.querySelector('#evidence-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Price</th><th>Market Cap</th><th>Revenue</th><th>Net Income</th></tr>';

            const tbody = document.querySelector('#evidence-table tbody');
            tbody.innerHTML = packages.map(pkg => `
                <tr>
                    <td class="ticker">${pkg.ticker}</td>
                    <td>$${pkg.price_market?.close?.toFixed(2) || '—'}</td>
                    <td>$${(pkg.price_market?.market_cap / 1e9).toFixed(2)}B</td>
                    <td>$${(pkg.fundamental?.revenue / 1e9).toFixed(2)}B</td>
                    <td>$${(pkg.fundamental?.net_income / 1e9).toFixed(2)}B</td>
                </tr>
            `).join('');
        }

        function renderKnowledge(data) {
            const profiles = data.profiles || [];
            document.getElementById('knowledge-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${profiles.length}</div></div>
                <div class="stat-card"><div class="stat-label">Avg Completion</div><div class="stat-value">${(profiles.reduce((s, p) => s + (p.metadata.fields_completed / p.metadata.fields_expected * 100), 0) / profiles.length).toFixed(0)}%</div></div>
            `;

            const thead = document.querySelector('#knowledge-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Return 1Y</th><th>Volatility</th><th>P/E</th><th>Completion</th></tr>';

            const tbody = document.querySelector('#knowledge-table tbody');
            tbody.innerHTML = profiles.map(p => `
                <tr>
                    <td class="ticker">${p.ticker}</td>
                    <td>${p.historical_trend?.return_1y?.toFixed(2) || '—'}%</td>
                    <td>${p.historical_trend?.volatility_daily?.toFixed(2) || '—'}%</td>
                    <td>${p.valuation?.pe_ratio_trailing?.toFixed(1) || '—'}x</td>
                    <td>${(p.metadata.fields_completed / p.metadata.fields_expected * 100).toFixed(0)}%</td>
                </tr>
            `).join('');
        }

        function renderPeer(data) {
            const comparisons = data.comparisons || [];
            document.getElementById('peer-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${comparisons.length}</div></div>
                <div class="stat-card"><div class="stat-label">Avg Group Size</div><div class="stat-value">${(comparisons.reduce((s, c) => s + c.peer_group.group_size, 0) / comparisons.length).toFixed(0)}</div></div>
            `;

            const thead = document.querySelector('#peer-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Group Size</th><th>Peers</th><th>Status</th></tr>';

            const tbody = document.querySelector('#peer-table tbody');
            tbody.innerHTML = comparisons.map(c => `
                <tr>
                    <td class="ticker">${c.ticker}</td>
                    <td>${c.peer_group.group_size}</td>
                    <td>${c.peer_group.peer_tickers.join(', ')}</td>
                    <td><span class="badge ${c.peer_group.group_size >= 3 ? 'badge-ok' : 'badge-alert'}">OK</span></td>
                </tr>
            `).join('');
        }

        function renderConfidence(data) {
            const scores = data.scores || [];
            document.getElementById('confidence-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${scores.length}</div></div>
                <div class="stat-card"><div class="stat-label">Avg Confidence</div><div class="stat-value">${(scores.reduce((s, s2) => s + s2.overall_confidence, 0) / scores.length).toFixed(0)}%</div></div>
            `;

            const thead = document.querySelector('#confidence-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Overall</th><th>Price</th><th>Fundamentals</th><th>Rating</th></tr>';

            const tbody = document.querySelector('#confidence-table tbody');
            tbody.innerHTML = scores.map(s => `
                <tr>
                    <td class="ticker">${s.ticker}</td>
                    <td>${s.overall_confidence.toFixed(0)}%</td>
                    <td>${s.price_data_confidence.toFixed(0)}%</td>
                    <td>${s.fundamental_data_confidence.toFixed(0)}%</td>
                    <td><span class="badge ${s.confidence_rating === 'high' ? 'badge-ok' : 'badge-medium'}">${s.confidence_rating}</span></td>
                </tr>
            `).join('');
        }

        function renderRisk(data) {
            const assessments = data.assessments || [];
            document.getElementById('risk-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${assessments.length}</div></div>
                <div class="stat-card"><div class="stat-label">High Risk</div><div class="stat-value">${assessments.filter(a => a.risk_rating === 'high').length}</div></div>
            `;

            const thead = document.querySelector('#risk-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Risk Score</th><th>Governance</th><th>Financial</th><th>Rating</th></tr>';

            const tbody = document.querySelector('#risk-table tbody');
            tbody.innerHTML = assessments.map(a => `
                <tr>
                    <td class="ticker">${a.ticker}</td>
                    <td>${a.risk_score.toFixed(0)}</td>
                    <td>${a.governance_risk_score.toFixed(0)}</td>
                    <td>${a.financial_risk_score.toFixed(0)}</td>
                    <td><span class="badge ${a.risk_rating === 'high' ? 'badge-alert' : 'badge-ok'}">${a.risk_rating}</span></td>
                </tr>
            `).join('');
        }

        function renderReasoning(data) {
            const outputs = data.reasoning_outputs || [];
            document.getElementById('reasoning-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${outputs.length}</div></div>
                <div class="stat-card"><div class="stat-label">Avg Consensus</div><div class="stat-value">${(outputs.reduce((s, o) => s + o.lens_agreement, 0) / outputs.length).toFixed(0)}%</div></div>
            `;

            const thead = document.querySelector('#reasoning-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Quality</th><th>Speculative</th><th>Multibagger</th><th>Final</th></tr>';

            const tbody = document.querySelector('#reasoning-table tbody');
            tbody.innerHTML = outputs.map(o => `
                <tr>
                    <td class="ticker">${o.ticker}</td>
                    <td>${o.quality_output?.conviction_score?.toFixed(0) || '—'}</td>
                    <td>${o.speculative_output?.conviction_score?.toFixed(0) || '—'}</td>
                    <td>${o.multibagger_output?.conviction_score?.toFixed(0) || '—'}</td>
                    <td><strong>${o.final_score.toFixed(0)}</strong></td>
                </tr>
            `).join('');
        }

        function renderAggregator(data) {
            const recs = data.recommendations || [];
            document.getElementById('aggregator-stats').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${recs.length}</div></div>
                <div class="stat-card"><div class="stat-label">Buy+</div><div class="stat-value">${recs.filter(r => r.recommendation.includes('buy')).length}</div></div>
                <div class="stat-card"><div class="stat-label">Hold</div><div class="stat-value">${recs.filter(r => r.recommendation === 'hold').length}</div></div>
                <div class="stat-card"><div class="stat-label">Sell</div><div class="stat-value">${recs.filter(r => r.recommendation.includes('sell')).length}</div></div>
            `;

            const thead = document.querySelector('#aggregator-table thead');
            thead.innerHTML = '<tr><th>Ticker</th><th>Recommendation</th><th>Conviction</th><th>Confidence</th><th>Risk</th></tr>';

            const tbody = document.querySelector('#aggregator-table tbody');
            tbody.innerHTML = recs.map(r => `
                <tr>
                    <td class="ticker">${r.ticker}</td>
                    <td><span class="badge badge-ok">${r.recommendation.replace('_', ' ').toUpperCase()}</span></td>
                    <td>${r.conviction}%</td>
                    <td>${r.confidence_score.toFixed(0)}</td>
                    <td>${r.risk_score.toFixed(0)}</td>
                </tr>
            `).join('');
        }

        function filterTable(stage) {
            const search = document.querySelector(`#stage-${stage} .search-box`)?.value.toUpperCase() || '';
            const table = document.querySelector(`#${stage}-table`);
            if (!table) return;
            const rows = table.querySelectorAll('tbody tr');
            rows.forEach(row => {
                const ticker = row.cells[0]?.textContent.toUpperCase() || '';
                row.style.display = ticker.includes(search) ? '' : 'none';
            });
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('smartUnifiedDarkMode', document.body.classList.contains('dark-mode'));
        }

        if (localStorage.getItem('smartUnifiedDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        loadData('layer1');
    </script>
</body>
</html>

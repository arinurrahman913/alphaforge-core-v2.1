<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlphaForge v2 — Layer 1 (data live)</title>
<style>
:root{
  --ink:#0F151B; --panel:#161F29; --panel2:#1B2632; --rule:#293745;
  --text:#C7D2DB; --dim:#8194A3; --faint:#5C6E7C;
  --direct:#5FB3C9; --derived:#D4A24C; --missing:#A8628A; --flag:#C4574F;
  --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Roboto Mono", Menlo, monospace;
  --serif: "Iowan Old Style", Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--ink);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}
.top{border-bottom:1px solid var(--rule);position:sticky;top:0;background:rgba(15,21,27,.94);backdrop-filter:blur(8px);z-index:10}
.top-in{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:baseline;gap:20px;flex-wrap:wrap}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
.brand b{color:var(--text);font-weight:600}
.src{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.sec{margin-top:44px}
.sec-head{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid var(--rule);padding-bottom:8px;margin-bottom:22px}
.sec-n{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.1em}
.sec-t{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)}
.sec-note{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim)}
.meta{display:flex;gap:26px;flex-wrap:wrap;padding:16px 0 0;font-family:var(--mono);font-size:11px}
.meta div span{display:block;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;font-size:10px;margin-bottom:3px}
.meta div b{font-weight:500;color:var(--text)}
.warn b{color:var(--derived)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--rule);display:flex;flex-direction:column}
.card-top{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 0}
.card-name{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);flex:1}
.kind{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 6px;border:1px solid}
.kind.d{color:var(--direct);border-color:var(--direct)}
.kind.v{color:var(--derived);border-color:var(--derived);background:rgba(212,162,76,.08)}
.val{font-family:var(--mono);font-size:26px;font-weight:500;padding:6px 14px 2px;letter-spacing:-.02em}
.val small{font-size:12px;color:var(--dim);font-weight:400}
.narr{font-family:var(--serif);font-size:13.5px;line-height:1.5;color:var(--text);padding:6px 14px 12px;opacity:.92}
.built{margin:0 14px 12px;padding:8px 10px;border-left:2px solid var(--derived);background:rgba(212,162,76,.05);font-family:var(--mono);font-size:10px;color:var(--dim);line-height:1.7}
.built em{color:var(--derived);font-style:normal;letter-spacing:.08em}
.prov{margin-top:auto;border-top:1px solid var(--rule);padding:8px 14px;font-family:var(--mono);font-size:9.5px;color:var(--faint);display:flex;gap:10px;flex-wrap:wrap;letter-spacing:.04em}
.prov b{color:var(--dim);font-weight:400}
.card.deg{border-color:rgba(212,162,76,.5)}
.card.mis{border-color:rgba(168,98,138,.5);background:repeating-linear-gradient(135deg,var(--panel),var(--panel) 9px,rgba(168,98,138,.05) 9px,rgba(168,98,138,.05) 18px)}
.card.mis .val{color:var(--missing);font-size:15px;padding-top:12px}
.stat{font-family:var(--mono);font-size:9px;letter-spacing:.1em;padding:3px 6px}
.stat.deg{color:var(--derived);background:rgba(212,162,76,.14)}
.stat.mis{color:var(--missing);background:rgba(168,98,138,.14)}
.dag{margin-top:12px;border:1px solid var(--rule);border-top:2px solid var(--derived);background:var(--panel);display:grid;grid-template-columns:200px 1fr;gap:0}
.dag-left{border-right:1px solid var(--rule);padding:14px;background:var(--panel2)}
.dag-lab{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-bottom:10px}
.feed{font-family:var(--mono);font-size:10.5px;color:var(--dim);padding:5px 0;border-bottom:1px dotted var(--rule);display:flex;justify-content:space-between;gap:8px}
.feed:last-child{border:0}
.feed b{font-weight:400}
.feed .ok{color:var(--direct)}
.feed .no{color:var(--missing)}
.sum{border:1px solid var(--rule);border-left:3px solid var(--derived);background:var(--panel);padding:18px 20px}
.sum-narr{font-family:var(--serif);font-size:16px;line-height:1.62;max-width:74ch;white-space:pre-line}
.limit{margin-top:14px;padding-top:12px;border-top:1px solid var(--rule);font-family:var(--mono);font-size:10.5px;color:var(--dim);display:flex;gap:8px;flex-wrap:wrap;align-items:baseline}
.pill{border:1px solid var(--rule);padding:2px 7px;font-size:9.5px;letter-spacing:.06em}
.pill.w{color:var(--derived);border-color:rgba(212,162,76,.4)}
.note{margin-top:10px;font-family:var(--mono);font-size:10px;color:var(--faint);line-height:1.7}
.err{font-family:var(--mono);font-size:12px;color:var(--flag);padding:20px;border:1px solid var(--flag)}
@media(max-width:820px){.dag{grid-template-columns:1fr}.dag-left{border-right:0;border-bottom:1px solid var(--rule)}}
</style>
</head>
<body>

<div class="top"><div class="top-in">
  <div class="brand">AlphaForge <b>v2</b> — Layer 1 (data live)</div>
  <div class="src" id="src-note">membaca dashboard/data/layer1_context.json</div>
</div></div>

<div class="wrap">
  <div id="content"><div class="note" style="margin-top:40px">Memuat…</div></div>
</div>

<script>
const NAME_LABEL = {
  yield_curve: "Yield Curve",
  volatility_index: "Volatility Index",
  currency_dxy: "Currency / DXY",
  commodity_signals: "Commodity Signals",
  market_regime: "Market Regime",
  sector_rotation: "Sector Rotation",
  liquidity_conditions: "Liquidity Conditions",
  macro_calendar: "Macro Calendar",
  business_cycle_stage: "Business Cycle Stage",
  money_flow: "Money Flow",
  market_breadth: "Market Breadth",
};

// Headline value per komponen — dibaca dari field `value` yang dihasilkan pipeline,
// bukan dihitung ulang di sini (Prinsip 2.1, 01_ARCHITECTURE/05_DASHBOARD_LOCAL.md).
const HEADLINE = {
  yield_curve: v => `${v.spread_10y_2y >= 0 ? "+" : ""}${v.spread_10y_2y.toFixed(2)}<small> % · 10Y-2Y · ${v.shape}</small>`,
  volatility_index: v => `${v.vix.toFixed(1)}<small> · ${v.level}</small>`,
  currency_dxy: v => `${v.dxy.toFixed(2)}<small> · ${v.change_30d_pct >= 0 ? "+" : ""}${v.change_30d_pct.toFixed(1)}% /30h</small>`,
  commodity_signals: v => `${v.wti.toFixed(2)}<small> · WTI</small>`,
  market_regime: v => `${v.regime.toUpperCase()}<small> · ${v.distance_to_ma200_pct >= 0 ? "+" : ""}${v.distance_to_ma200_pct.toFixed(1)}% vs MA200</small>`,
  sector_rotation: v => `${v.leader}<small> · memimpin</small>`,
  liquidity_conditions: v => `${v.m2_yoy_pct >= 0 ? "+" : ""}${v.m2_yoy_pct.toFixed(1)}<small> % · M2 YoY</small>`,
  macro_calendar: v => `${v.events.length}<small> peristiwa / ${v.horizon_days}h</small>`,
  business_cycle_stage: v => `${v.stage.toUpperCase()}`,
  money_flow: v => v.inflows.length ? `${v.inflows[0]}<small> · inflow</small>` : `NEUTRAL<small> · tidak ada inflow/outflow signifikan</small>`,
  market_breadth: v => `${v.pct_above_ma200.toFixed(1)}<small> % > MA200 · ${v.advances}/${v.universe_size} naik</small>`,
};

const SOURCE_TICKER = {
  yield_curve: "T10Y2Y", volatility_index: "^VIX", currency_dxy: "DX-Y.NYB",
  commodity_signals: "CL=F, GC=F", market_regime: "^GSPC", sector_rotation: "11 sector ETF",
  liquidity_conditions: "WALCL, M2SL", macro_calendar: "release calendar",
  business_cycle_stage: "GDP, UNRATE, INDPRO", money_flow: "11 sector ETF",
  market_breadth: "universe screening",
};

function fmtTime(iso) {
  if (!iso) return "—";
  try { return iso.split("T")[1].slice(0, 5) + "Z"; } catch { return iso; }
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function renderCard(name, r) {
  const label = NAME_LABEL[name] || name;
  const kindClass = r.kind === "direct" ? "d" : "v";
  const kindLabel = r.kind.toUpperCase();
  let cardClass = "card";
  let statBadge = "";
  if (r.status === "missing") { cardClass += " mis"; statBadge = '<div class="stat mis">MISSING</div>'; }
  else if (r.status === "degraded") { cardClass += " deg"; statBadge = '<div class="stat deg">DEGRADED</div>'; }

  let val, narr;
  if (r.status === "missing" || !r.value) {
    val = "TIDAK DIHITUNG";
    narr = `<span style="color:var(--missing);opacity:.85">${esc(r.note || "Tidak ada catatan.")}</span>`;
  } else {
    try { val = HEADLINE[name] ? HEADLINE[name](r.value) : JSON.stringify(r.value); }
    catch { val = "—"; }
    narr = esc(r.narrative || "(narasi belum tersedia)");
  }

  const built = r.kind === "derived" && r.status !== "missing"
    ? `<div class="built"><em>METHOD VERSION</em><br>${esc(r.method_version || "—")}${r.note ? "<br>" + esc(r.note) : ""}</div>`
    : "";

  const provTicker = SOURCE_TICKER[name] || "";
  const provProvider = (r.sources && r.sources[0]) ? r.sources[0].provider : "—";
  const provTime = (r.sources && r.sources[0]) ? fmtTime(r.sources[0].fetched_at) : "—";
  const methodTag = r.kind === "derived" && r.method_version ? ` · <b>method ${esc(r.method_version)}</b>` : "";

  return `<div class="${cardClass}">
    <div class="card-top"><div class="card-name">${label}</div><div class="kind ${kindClass}">${kindLabel}</div>${statBadge}</div>
    <div class="val">${val}</div>
    <div class="narr">${narr}</div>
    ${built}
    <div class="prov"><b>${esc(provProvider)}</b> · ${esc(provTicker)} · <b>${provTime}</b>${methodTag}</div>
  </div>`;
}

function renderDag(vix, breadth, sentiment) {
  const vixOk = vix.status === "ok";
  const breadthOk = breadth.status === "ok";
  const sentClass = sentiment.status === "missing" ? "mis" : sentiment.status === "degraded" ? "deg" : "";
  const sentBadge = sentiment.status === "missing" ? '<div class="stat mis">MISSING</div>'
    : sentiment.status === "degraded" ? '<div class="stat deg">DEGRADED</div>' : "";
  let val, narr;
  if (sentiment.status === "missing" || !sentiment.value) {
    val = "TIDAK DIHITUNG";
    narr = `<span style="color:var(--missing);opacity:.85">${esc(sentiment.note || "")}</span>`;
  } else {
    val = `${sentiment.value.label.toUpperCase()}<small> · skor ${sentiment.value.score_0_100.toFixed(0)}/100</small>`;
    narr = esc(sentiment.narrative || "");
  }

  return `<div class="dag">
    <div class="dag-left">
      <div class="dag-lab">Input dari Layer 1</div>
      <div class="feed"><b>Volatility Index</b><span class="${vixOk ? "ok" : "no"}">${vixOk ? vix.value.vix.toFixed(1) + " ✓" : "missing ✗"}</span></div>
      <div class="feed"><b>Market Breadth</b><span class="${breadthOk ? "ok" : "no"}">${breadthOk ? breadth.value.pct_above_ma200.toFixed(1) + "% ✓" : "missing ✗"}</span></div>
      <div class="dag-lab" style="margin-top:14px">Input luar</div>
      <div class="feed"><b>AAII survey</b><span class="no">belum diintegrasikan</span></div>
      <div class="feed"><b>Put/call ratio</b><span class="no">belum diintegrasikan</span></div>
    </div>
    <div class="card ${sentClass}" style="border:0">
      <div class="card-top">
        <div class="card-name">Market Sentiment — satu-satunya composite</div>
        <div class="kind v">DERIVED</div>${sentBadge}
      </div>
      <div class="val">${val}</div>
      <div class="narr">${narr}</div>
      <div class="prov"><b>method ${esc(sentiment.method_version || "—")}</b> · status: ${sentiment.status}</div>
    </div>
  </div>`;
}

function renderSummary(cs) {
  const limiters = (cs.components_degraded || []).map(c => `<span class="pill">${esc(c)}</span>`).join(" ");
  const bandUpper = cs.confidence.band.toUpperCase();
  return `<div class="sum">
    <div class="sum-narr">${esc(cs.narrative)}</div>
    <div class="limit">
      <span class="pill w">CONFIDENCE: ${bandUpper} (${cs.confidence.score.toFixed(0)})</span>
      ${limiters ? "<span>dibatasi oleh:</span>" + limiters : ""}
    </div>
  </div>`;
}

async function main() {
  const el = document.getElementById("content");
  let pkg;
  try {
    const resp = await fetch("./data/layer1_context.json", { cache: "no-store" });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    pkg = await resp.json();
  } catch (e) {
    el.innerHTML = `<div class="err">Gagal memuat data/layer1_context.json: ${esc(String(e))}<br><br>
      Generate dulu: <code>python -m alphaforge.cli layer1 --out dashboard/data/layer1_context.json</code></div>`;
    return;
  }

  document.getElementById("src-note").textContent =
    `session ${pkg.session_id} · generated ${fmtTime(pkg.generated_at)}`;

  const leafOrder = ["yield_curve", "volatility_index", "currency_dxy", "commodity_signals",
    "market_regime", "sector_rotation", "liquidity_conditions", "macro_calendar",
    "business_cycle_stage", "money_flow", "market_breadth"];

  const comps = pkg.components;
  const nOk = Object.values(comps).filter(c => c.status === "ok").length;
  const nDeg = Object.values(comps).filter(c => c.status === "degraded").length;
  const nMis = Object.values(comps).filter(c => c.status === "missing").length;

  const cardsHtml = leafOrder.filter(n => comps[n]).map(n => renderCard(n, comps[n])).join("\n");
  const dagHtml = renderDag(comps.volatility_index, comps.market_breadth, comps.market_sentiment);

  el.innerHTML = `
  <div class="meta">
    <div><span>Session</span><b>${esc(pkg.session_id)}</b></div>
    <div><span>Komponen</span><b>${Object.keys(comps).length}</b></div>
    <div><span>OK</span><b>${nOk}</b></div>
    <div class="warn"><span>Degraded</span><b>${nDeg}</b></div>
    <div class="warn"><span>Missing</span><b>${nMis}</b></div>
    <div><span>Dihitung</span><b>sekali per sesi</b></div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-n">§1</div><div class="sec-t">Bukti Terkini &amp; Analisa</div>
      <div class="sec-note">data live dari alphaforge.layer1.pipeline</div>
    </div>
    <div class="grid">${cardsHtml}</div>
    ${dagHtml}
    <div class="note">↑ Market Sentiment sengaja dipisah dari kartu leaf di atas — satu-satunya komponen composite, dihitung terakhir dari VIX + Market Breadth.</div>
  </div>

  <div class="sec">
    <div class="sec-head">
      <div class="sec-n">§2</div><div class="sec-t">Kesimpulan Konteks</div>
      <div class="sec-note">context_summary · dihasilkan pipeline (D-06)</div>
    </div>
    ${renderSummary(pkg.context_summary)}
  </div>`;
}

main();
</script>
</body>
</html>

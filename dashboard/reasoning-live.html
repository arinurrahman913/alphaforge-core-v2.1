<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaForge v2 — Reasoning Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }
        body.dark-mode { background: #1a1a1a; color: #e0e0e0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        body.dark-mode header { background: #222; }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .meta { font-size: 13px; color: #666; }
        body.dark-mode .meta { color: #999; }
        .search-box { width: 300px; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; margin-top: 16px; }
        body.dark-mode .search-box { background: #333; border-color: #555; color: #e0e0e0; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .stat-card { background: white; padding: 16px; border-radius: 8px; }
        body.dark-mode .stat-card { background: #222; }
        .stat-value { font-size: 20px; font-weight: 600; }
        .table-wrapper { background: white; border-radius: 8px; overflow: hidden; }
        body.dark-mode .table-wrapper { background: #222; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f9f9f9; padding: 12px; text-align: left; font-weight: 600; font-size: 13px; border-bottom: 2px solid #ddd; }
        body.dark-mode th { background: #333; border-bottom-color: #555; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        body.dark-mode td { border-bottom-color: #444; }
        tr:hover { background: #f9f9f9; cursor: pointer; }
        body.dark-mode tr:hover { background: #2a2a2a; }
        .ticker-cell { font-weight: 600; color: #0066cc; }
        .lens-score { background: #e0e7ff; color: #4338ca; padding: 4px 8px; border-radius: 3px; font-size: 12px; font-weight: 500; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); }
        .modal-content { background: white; margin: 5% auto; padding: 0; border-radius: 8px; width: 90%; max-width: 1000px; max-height: 80vh; overflow-y: auto; }
        body.dark-mode .modal-content { background: #222; }
        .modal-header { padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; background: #f9f9f9; }
        body.dark-mode .modal-header { background: #333; border-bottom-color: #555; }
        .close { font-size: 28px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .lens-card { background: #f9f9f9; padding: 16px; border-radius: 6px; border-left: 4px solid #0066cc; margin-bottom: 16px; }
        body.dark-mode .lens-card { background: #333; }
        .lens-card.quality { border-left-color: #8b5cf6; }
        .lens-card.speculative { border-left-color: #f97316; }
        .lens-card.multibagger { border-left-color: #10b981; }
        .lens-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .lens-name { font-weight: 600; font-size: 14px; }
        .lens-score-badge { background: white; padding: 4px 12px; border-radius: 3px; font-weight: 600; }
        body.dark-mode .lens-score-badge { background: #222; }
        .factors { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
        .factor-list { font-size: 13px; }
        .factor-item { padding: 4px 0; }
        .positive { color: #166534; }
        .negative { color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>AlphaForge v2 — Reasoning Dashboard</h1>
                <div class="meta">Layer 2 Fase B Stage 4: 3-Lens Analysis (Quality/Speculative/Multibagger)</div>
            </div>
        </header>

        <input type="text" class="search-box" id="searchBox" placeholder="Cari ticker..." onkeyup="filterTable()">

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Outputs</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Avg Consensus</div>
                <div class="stat-value" id="statConsensus">0%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">High Divergence</div>
                <div class="stat-value" id="statDivergence">0</div>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Ticker</th>
                        <th>Quality</th>
                        <th>Speculative</th>
                        <th>Multibagger</th>
                        <th>Final Score</th>
                        <th>Divergence</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTicker"></h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let allReasoning = [];

        async function loadData() {
            try {
                const response = await fetch('data/reasoning_outputs.json');
                const data = await response.json();
                allReasoning = data.reasoning_outputs || [];
                renderTable();
                updateStats();
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Error loading data</td></tr>';
            }
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            allReasoning.forEach(r => {
                const row = document.createElement('tr');
                row.onclick = () => showDetail(r);

                row.innerHTML = `
                    <td class="ticker-cell">${r.ticker}</td>
                    <td><span class="lens-score">${r.quality_output?.conviction_score || '-'}</span></td>
                    <td><span class="lens-score">${r.speculative_output?.conviction_score || '-'}</span></td>
                    <td><span class="lens-score">${r.multibagger_output?.conviction_score || '-'}</span></td>
                    <td><strong>${r.final_score.toFixed(0)}</strong></td>
                    <td>${r.divergence_level}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterTable() {
            const search = document.getElementById('searchBox').value.toUpperCase();
            const rows = document.getElementById('tableBody').getElementsByTagName('tr');
            for (let row of rows) {
                const ticker = row.cells[0].textContent.toUpperCase();
                row.style.display = ticker.includes(search) ? '' : 'none';
            }
        }

        function showDetail(reasoning) {
            document.getElementById('modalTicker').textContent = reasoning.ticker;

            let html = '';
            ['quality_output', 'speculative_output', 'multibagger_output'].forEach((key, idx) => {
                const output = reasoning[key];
                if (!output) return;

                const classMap = ['quality', 'speculative', 'multibagger'];
                html += `
                    <div class="lens-card ${classMap[idx]}">
                        <div class="lens-header">
                            <div class="lens-name">${output.lens_name.toUpperCase()}</div>
                            <div class="lens-score-badge">${output.conviction_score.toFixed(0)} - ${output.stance}</div>
                        </div>
                        <div class="factors">
                            <div class="factor-list">
                                <strong>Positive:</strong>
                                ${output.positive_factors.length ? output.positive_factors.map(f => `<div class="factor-item positive">✓ ${f}</div>`).join('') : '<div class="factor-item">-</div>'}
                            </div>
                            <div class="factor-list">
                                <strong>Negative:</strong>
                                ${output.negative_factors.length ? output.negative_factors.map(f => `<div class="factor-item negative">✗ ${f}</div>`).join('') : '<div class="factor-item">-</div>'}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                <div style="background: #e0e7ff; padding: 16px; border-radius: 6px; border-left: 4px solid #4338ca; margin-top: 20px;">
                    <strong>Consensus: ${reasoning.lens_agreement.toFixed(0)}%</strong><br>
                    <strong>Final Score:</strong> ${reasoning.final_score.toFixed(0)}<br>
                    <strong>Divergence:</strong> ${reasoning.divergence_level}
                </div>
            `;

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('detailModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
        }

        function updateStats() {
            const total = allReasoning.length;
            const avgConsensus = total > 0 ? (allReasoning.reduce((sum, r) => sum + r.lens_agreement, 0) / total).toFixed(0) : 0;
            const highDiv = allReasoning.filter(r => r.divergence_level === 'high').length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statConsensus').textContent = avgConsensus + '%';
            document.getElementById('statDivergence').textContent = highDiv;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('detailModal');
            if (event.target === modal) modal.style.display = 'none';
        };

        loadData();
    </script>
</body>
</html>
